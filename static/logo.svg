<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="54" fill="url(#bg)"/>

  <!-- Vault door outline -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Data bars (stylized vault shelf) -->
  <rect x="28" y="50" width="22" height="6" rx="3" fill="url(#bar)" opacity="0.95"/>
  <rect x="28" y="60" width="16" height="6" rx="3" fill="url(#bar)" opacity="0.75"/>
  <rect x="28" y="70" width="28" height="6" rx="3" fill="url(#bar)" opacity="0.55"/>

  <!-- Right side: lock / keyhole -->
  <circle cx="80" cy="60" r="14" fill="#1e1e2e" opacity="0.85"/>
  <circle cx="80" cy="60" r="10" fill="none" stroke="#a5b4fc" stroke-width="2.5"/>
  <circle cx="80" cy="57" r="3.5" fill="#a5b4fc"/>
  <rect x="77.5" y="59" width="5" height="9" rx="2.5" fill="#a5b4fc"/>

  <!-- Top accent dot -->
  <circle cx="60" cy="26" r="4" fill="#a5b4fc" filter="url(#glow)"/>

  <!-- Bottom accent dot -->
  <circle cx="60" cy="94" r="3" fill="#818cf8" opacity="0.5"/>
</svg>
