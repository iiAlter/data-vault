{% extends "base.html" %}
{% block title %}DataVault - 消费记录{% endblock %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
    <h1>💰 消费记录</h1>
    <div style="color:#888; font-size:13px">
        本月合计：¥<span id="month-total">-</span>
    </div>
</div>

<!-- 筛选 -->
<div class="card" style="margin-bottom:15px">
    <div style="display:flex; gap:10px; flex-wrap:wrap">
        <input type="month" id="month-filter"
               style="padding:8px 12px; border:1px solid #ddd; border-radius:8px">
        <select id="category-filter" style="padding:8px 12px; border:1px solid #ddd; border-radius:8px">
            <option value="">全部分类</option>
        </select>
        <button onclick="loadExpenses()" style="padding:8px 16px; background:#667eea; color:#fff; border:none; border-radius:8px; cursor:pointer">搜索</button>
    </div>
</div>

<!-- 消费列表 -->
<div class="item-list" id="expenses-list">
    <div class="empty">加载中...</div>
</div>
{% endblock %}

{% block script %}
<script>
async function loadExpenses() {
    const month = document.getElementById("month-filter").value;
    const category = document.getElementById("category-filter").value;
    let url = "/api/expenses?limit=100";
    if (month) url += "&month=" + month;
    if (category) url += "&category=" + encodeURIComponent(category);

    const [data, stats] = await Promise.all([
        api(url),
        api("/api/expenses/stats" + (month ? "?month=" + month : ""))
    ]);

    document.getElementById("month-total").textContent = stats.total.toLocaleString();
    const container = document.getElementById("expenses-list");

    if (data.length === 0) {
        container.innerHTML = '<div class="empty">暂无消费记录</div>';
        return;
    }

    container.innerHTML = data.map(item => {
        const time = new Date(item.date).toLocaleDateString("zh-CN");
        return `<div class="item">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div>
                    <div class="title">${item.description || item.category}</div>
                    <div class="meta">${item.category} · ${time}</div>
                </div>
                <div style="font-size:20px; font-weight:bold; color:#f5576c">
                    -¥${item.amount.toLocaleString()}
                </div>
            </div>
        </div>`;
    }).join("");
}

async function loadCategories() {
    const stats = await api("/api/expenses/stats");
    const select = document.getElementById("category-filter");
    stats.by_category.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat.category;
        opt.textContent = `${cat.category} (¥${Math.round(cat.total).toLocaleString()})`;
        select.appendChild(opt);
    });
}

// 默认显示当月
const now = new Date();
document.getElementById("month-filter").value = now.toISOString().slice(0, 7);

loadExpenses();
loadCategories();
</script>
{% endblock %}
