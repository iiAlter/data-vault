{% extends "base.html" %}
{% block title %}DataVault - 链接收藏{% endblock %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
    <h1>🔗 链接收藏</h1>
    <div style="color:#888; font-size:13px">
        共 <span id="total-count">-</span> 条
    </div>
</div>

<!-- 筛选 -->
<div class="card" style="margin-bottom:15px">
    <div style="display:flex; gap:10px; flex-wrap:wrap">
        <input type="text" id="search-input" placeholder="搜索标题/摘要/URL..." 
               style="flex:1; padding:8px 12px; border:1px solid #ddd; border-radius:8px; min-width:200px">
        <select id="category-filter" style="padding:8px 12px; border:1px solid #ddd; border-radius:8px">
            <option value="">全部分类</option>
        </select>
        <button onclick="loadLinks()" style="padding:8px 16px; background:#667eea; color:#fff; border:none; border-radius:8px; cursor:pointer">搜索</button>
    </div>
</div>

<!-- 链接列表 -->
<div class="item-list" id="links-list">
    <div class="empty">加载中...</div>
</div>
{% endblock %}

{% block script %}
<script>
async function loadLinks() {
    const search = document.getElementById("search-input").value;
    const category = document.getElementById("category-filter").value;
    let url = "/api/links?limit=100";
    if (search) url += "&search=" + encodeURIComponent(search);
    if (category) url += "&category=" + encodeURIComponent(category);

    const data = await api(url);
    const container = document.getElementById("links-list");
    document.getElementById("total-count").textContent = data.length;

    if (data.length === 0) {
        container.innerHTML = '<div class="empty">暂无收藏</div>';
        return;
    }

    container.innerHTML = data.map(link => {
        const tags = link.tags ? JSON.parse(link.tags) : [];
        const time = new Date(link.collected_at).toLocaleDateString("zh-CN");
        return `<div class="item">
            <div class="title">
                <a href="${link.url}" target="_blank" style="color:#333; text-decoration:none">${link.title}</a>
                <span style="font-size:12px; color:#888; margin-left:8px">${link.source || ""}</span>
            </div>
            <div class="desc">${link.summary || ""}</div>
            <div class="meta" style="margin-top:8px">
                ${tags.map(t => `<span class="tag">#${t}</span>`).join("")}
                <span style="margin-left:auto">${time}</span>
            </div>
        </div>`;
    }).join("");
}

async function loadCategories() {
    const stats = await api("/api/links/stats");
    const select = document.getElementById("category-filter");
    stats.by_category.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat.category;
        opt.textContent = `${cat.category} (${cat.count})`;
        select.appendChild(opt);
    });
}

// 回车搜索
document.getElementById("search-input").addEventListener("keyup", e => {
    if (e.key === "Enter") loadLinks();
});

loadLinks();
loadCategories();
</script>
{% endblock %}
