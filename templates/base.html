<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DataVault{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8f7fa;
            --surface: #ffffff;
            --surface-rgb: 255, 255, 255;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --accent-light: #34d399;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --text: #1e1e2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 14px;
            --radius-sm: 8px;
        }

        [data-theme="dark"] {
            --bg: #11111a;
            --surface: #1c1c27;
            --surface-rgb: 28, 28, 39;
            --primary: #7c7ffa;
            --primary-light: #a5a7fb;
            --primary-dark: #5b5ce0;
            --accent: #10b981;
            --accent-light: #34d399;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --text: #e4e4f0;
            --text-secondary: #9090a8;
            --text-muted: #5a5a72;
            --border: #2c2c3e;
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAV ===== */
        nav {
            background: rgba(var(--surface-rgb, 255,255,255), 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        [data-theme="dark"] nav {
            background: rgba(28,28,39, 0.85);
        }
        nav .inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 0;
            height: 60px;
        }
        nav .logo {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-right: 32px;
            flex-shrink: 0;
        }
        nav .logo span { color: var(--primary); }

        /* Nav tabs — pill indicator style */
        nav ul {
            display: flex;
            list-style: none;
            gap: 2px;
            height: 100%;
            align-items: stretch;
        }
        nav ul li {
            display: flex;
            align-items: stretch;
        }
        nav ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0 14px;
            font-size: 13.5px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            transition: color 0.15s;
            border-radius: 0;
        }
        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 99px 99px 0 0;
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        nav ul li a:hover { color: var(--text); }
        nav ul li a:hover::after { width: 40%; }
        nav ul li a.active {
            color: var(--primary);
            font-weight: 600;
        }
        nav ul li a.active::after { width: 60%; }

        /* Right side controls */
        nav .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        nav .icon-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            background: transparent;
            white-space: nowrap;
        }
        nav .icon-btn:hover {
            color: var(--text);
            background: var(--bg);
        }
        nav .icon-btn.danger:hover {
            color: var(--danger);
            background: rgba(244,63,94,0.08);
        }
        nav .icon-btn.theme:hover {
            color: #fbbf24;
        }
        nav .divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 6px;
            flex-shrink: 0;
        }

        /* ===== LAYOUT ===== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ===== STAT CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 0;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card .card-bg {
            position: absolute;
            right: -10px;
            top: -10px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            opacity: 0.08;
        }
        .stat-card.purple .card-bg { background: var(--primary); }
        .stat-card.green .card-bg { background: var(--accent); }
        .stat-card.orange .card-bg { background: var(--warning); }
        .stat-card.red .card-bg { background: var(--danger); }
        .stat-card .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
            word-break: break-all;
            min-width: 0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-card .sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            white-space: nowrap;
        }
        .stat-card .sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== CHART BARS ===== */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            min-width: 0;
        }
        .bar-label {
            width: 72px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: right;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .bar-track {
            flex: 1;
            min-width: 60px;
            height: 10px;
            background: var(--bg);
            border-radius: 99px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 100%;
        }
        .bar-fill.purple { background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
        .bar-fill.green { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
        .bar-fill.orange { background: linear-gradient(90deg, #fb923c, #fbbf24); }
        .bar-fill.red { background: linear-gradient(90deg, var(--danger), #fb7185); }
        .bar-value {
            width: 48px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        /* ===== ITEM LIST ===== */
        .item-list { display: flex; flex-direction: column; }
        .item {
            padding: 16px 18px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: border-color 0.15s, background 0.15s;
        }
        .item + .item { margin-top: 8px; }
        .item:hover { border-color: var(--border); background: var(--surface); }
        .item .title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }
        .item .title a {
            color: var(--text);
            text-decoration: none;
            word-break: break-all;
        }
        .item .title a:hover { color: var(--primary); }
        .item .meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .item .desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.5;
        }

        /* ===== TAGS ===== */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .cat-tag { cursor: pointer; transition: background 0.15s, color 0.15s; }
        .cat-tag.active {
            background: rgba(99,102,241,0.2);
            color: var(--primary-dark);
        }

        /* ===== FORM ELEMENTS ===== */
        input[type="text"],
        input[type="month"],
        input[type="number"],
        select {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        /* Refined action buttons */
        button {
            padding: 9px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            box-shadow: 0 1px 3px rgba(99,102,241,0.25);
            letter-spacing: 0.1px;
        }
        button:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(99,102,241,0.35);
            transform: translateY(-1px);
        }
        button:active { transform: translateY(0) scale(0.98); box-shadow: 0 1px 3px rgba(99,102,241,0.2); }

        /* Secondary / ghost button */
        button.ghost {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            box-shadow: none;
        }
        button.ghost:hover {
            background: rgba(99,102,241,0.06);
            box-shadow: none;
        }
        button.ghost:active { background: rgba(99,102,241,0.1); }

        /* Danger button */
        button.danger {
            background: var(--danger);
            box-shadow: 0 1px 3px rgba(244,63,94,0.25);
        }
        button.danger:hover {
            box-shadow: 0 4px 12px rgba(244,63,94,0.35);
        }

        /* Icon button */
        button.icon-btn {
            padding: 8px 16px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== CODE BLOCK ===== */
        code {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            background: var(--bg);
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 4px;
        }
        .code-block {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            word-break: break-all;
            overflow-x: auto;
            margin-top: 10px;
            line-height: 1.6;
        }
        [data-theme="dark"] .code-block {
            background: #0d0d1a;
            border-color: #2a2a3e;
            color: #a8b3cf;
        }

        /* ===== EMPTY STATE ===== */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }
        .filter-bar input { flex: 1; min-width: 180px; }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .page-header > div {
            font-size: 12px;
            white-space: nowrap;
        }
        .page-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* ===== EXPENSE ITEM ===== */
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: border-color 0.15s;
        }
        .expense-item:hover { border-color: var(--border); }
        .expense-item .left .desc { font-weight: 600; font-size: 14px; }
        .expense-item .left .meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .expense-item .amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--danger);
            font-variant-numeric: tabular-nums;
        }

        /* ===== MONEY BADGE ===== */
        .money {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }
        .money.income { color: var(--accent); }
        .money.expense { color: var(--danger); }

        /* ===== SECTION TITLE ===== */
        h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; }
        h3 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ===== STAT CARD FOOTER (action links) ===== */
        .card-footer {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .card-action {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            background: rgba(99,102,241,0.1);
            color: var(--primary);
            border-radius: 99px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
        }
        .card-action:hover {
            background: rgba(99,102,241,0.18);
            transform: translateY(-1px);
        }
        .card-action.green {
            background: rgba(16,185,129,0.1);
            color: var(--accent);
        }
        .card-action.green:hover {
            background: rgba(16,185,129,0.18);
        }
        .card-action.ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .card-action.ghost:hover {
            background: var(--bg);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== CHART CARD refinement ===== */
        .chart-card .card-header {
            margin-bottom: 16px;
        }
        .chart-card .card-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== COPY BUTTON ===== */
        .copy-wrap {
            position: relative;
            overflow: visible;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            background: var(--border);
            color: var(--text-secondary);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            opacity: 0;
        }
        .code-block:hover .copy-btn,
        .copy-wrap:hover .copy-btn { opacity: 1; }
        .copy-btn:hover {
            background: var(--primary);
            color: #fff;
        }
        .copy-btn.copied {
            background: var(--accent);
            color: #fff;
            opacity: 1;
        }

        /* ===== MODAL ===== */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }
        .modal-box {
            position: relative;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            text-transform: none;
            letter-spacing: 0;
            color: var(--text);
        }
        .modal-close {
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            line-height: 1;
            transition: color 0.15s;
        }
        .modal-close:hover { color: var(--text); }

        /* ===== FORM (modal-level) ===== */
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .form-actions button { flex: 1; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            nav .inner { gap: 0; padding: 0 12px; height: 52px; }
            nav .logo { font-size: 15px; margin-right: 16px; }
            nav ul li a { padding: 0 10px; font-size: 13px; }
            nav ul li a .tab-label { display: none; }
            nav ul li a::after { bottom: 0; }
            nav .icon-btn span { display: none; }
            nav .icon-btn { padding: 6px 8px; }
            nav .divider { margin: 0 2px; }
            .container { padding: 16px 12px; }
            h1 { font-size: 18px; }
            .page-header h1 { font-size: 16px; white-space: normal; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 14px 16px; }
            .stat-card .value { font-size: 16px; }
            .stat-card .label { font-size: 10px; }
            .chart-grid { grid-template-columns: 1fr; }
            .filter-bar { gap: 8px; }
            .filter-bar input { min-width: 0; }
        }

        /* ===== NOISE TEXTURE ===== */
        .noisy { position: relative; }
        .noisy::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            border-radius: inherit;
        }
    </style>
</head>
<body>
    <nav>
        <div class="inner">
            <a href="/" class="logo">Data<span>Vault</span></a>
            <ul id="nav-tabs">

                <li><a href="/links" class="{% if request.path == '/links' %}active{% endif %}" data-tab="links">收藏</a></li>

    <script>
    // ============ Auth ============
    (function checkAuth() {
        const token = sessionStorage.getItem("dv_token");
        if (!token) {
            window.location.href = "/login";
            return;
        }
        // Verify token with server
        fetch("/api/me", {
            headers: { "Authorization": "Bearer " + token }
        }).then(r => {
            if (!r.ok) {
                sessionStorage.removeItem("dv_token");
                window.location.href = "/login";
            }
        }).catch(() => {
            // Network error - allow retry on next interaction
        });
    })();

    // ============ API Helper (auto-attaches Bearer token) ============
    async function api(url) {
        const token = sessionStorage.getItem("dv_token") || "";
        const res = await fetch(url, {
            headers: token ? { "Authorization": "Bearer " + token } : {}
        });
        if (res.status === 401) {
            sessionStorage.removeItem("dv_token");
            window.location.href = "/login";
            return { error: "Unauthorized" };
        }
        return res.json();
    }

    // ============ Logout ============
    async function logout() {
        const token = sessionStorage.getItem("dv_token") || "";
        await fetch("/api/logout", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token }
        });
        sessionStorage.removeItem("dv_token");
        window.location.href = "/login";
    }

    // ============ Tab Visibility + Theme ============
    (function() {
        try {
            const hidden = JSON.parse(localStorage.getItem("datavault:hidden_tabs") || "[]");
            const nav = document.getElementById("nav-tabs");
            if (nav) {
                hidden.forEach(tab => {
                    const el = nav.querySelector(`[data-tab="${tab}"]`);
                    if (el) el.closest("li").style.display = "none";
                });
            }
        } catch(e) {}

        const theme = localStorage.getItem("datavault:theme") || "light";
        if (theme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            const toggle = document.getElementById("theme-toggle");
            if (toggle) toggle.innerHTML = "亮色";
        }
    })();

    document.getElementById("theme-toggle")?.addEventListener("click", function() {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        if (isDark) {
            document.documentElement.removeAttribute("data-theme");
            localStorage.setItem("datavault:theme", "light");
            this.innerHTML = "深色";
        } else {
            document.documentElement.setAttribute("data-theme", "dark");
            localStorage.setItem("datavault:theme", "dark");
            this.innerHTML = "浅色";
        }
    });
    </script>
    {% block script %}{% endblock %}

    <!-- 记一笔弹窗（全局） -->
    <div id="expense-modal" class="modal" style="display:none">
        <div class="modal-backdrop" onclick="closeExpenseModal()"></div>
        <div class="modal-box">
            <div class="modal-header">
                <h3>记一笔</h3>
                <span class="modal-close" onclick="closeExpenseModal()">&times;</span>
            </div>
            <form id="expense-form" onsubmit="submitExpense(event)">
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="exp-amount" step="0.01" min="0" placeholder="0.00" required autofocus>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="exp-category" required>
                        <option value="">请选择</option>
                        <option value="餐饮">餐饮</option>
                        <option value="交通">交通</option>
                        <option value="购物">购物</option>
                        <option value="娱乐">娱乐</option>
                        <option value="居住">居住</option>
                        <option value="医疗">医疗</option>
                        <option value="教育">教育</option>
                        <option value="通讯">通讯</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>说明</label>
                    <input type="text" id="exp-desc" placeholder="可选" maxlength="100">
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="exp-date">
                </div>
                <div class="form-actions">
                    <button type="button" class="ghost" onclick="closeExpenseModal()">取消</button>
                    <button type="submit">保存</button>
                </div>
                <div id="exp-error" style="color:var(--danger);font-size:13px;margin-top:8px;display:none"></div>
            </form>
        </div>
    </div>

    <script>
    function openAddExpense() {
        document.getElementById("expense-modal").style.display = "flex";
        document.getElementById("exp-amount").value = "";
        document.getElementById("exp-category").value = "";
        document.getElementById("exp-desc").value = "";
        document.getElementById("exp-date").value = new Date().toISOString().slice(0, 10);
        document.getElementById("exp-error").style.display = "none";
        document.getElementById("exp-amount").focus();
    }
    function closeExpenseModal() {
        document.getElementById("expense-modal").style.display = "none";
    }
    async function submitExpense(e) {
        e.preventDefault();
        const amount = parseFloat(document.getElementById("exp-amount").value);
        const category = document.getElementById("exp-category").value;
        const description = document.getElementById("exp-desc").value.trim();
        const date = document.getElementById("exp-date").value;
        const errorEl = document.getElementById("exp-error");
        if (!amount || amount <= 0) {
            errorEl.textContent = "请输入有效金额"; errorEl.style.display = "block"; return;
        }
        const token = sessionStorage.getItem("dv_token") || "";
        const res = await fetch("/api/expenses", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ amount, category, description, date })
        });
        if (res.ok) {
            closeExpenseModal();
            // 消费页：刷新列表；首页：整个页面刷新以更新服务端渲染的统计
            if (typeof loadExpenses === "function") {
                loadExpenses();
            } else {
                window.location.reload();
            }
        } else {
            errorEl.textContent = "保存失败，请重试"; errorEl.style.display = "block";
        }
    }
    </script>
</body>
