<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DataVault{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* 导航 */
        nav { background: #1a1a2e; color: #fff; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
        nav .inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 30px; }
        nav .logo { font-size: 20px; font-weight: bold; padding: 15px 0; }
        nav .logo span { color: #00d4ff; }
        nav ul { display: flex; list-style: none; gap: 5px; }
        nav a { color: #aaa; text-decoration: none; padding: 15px 12px; display: block; transition: color 0.2s; }
        nav a:hover, nav a.active { color: #fff; }
        nav a.active { border-bottom: 2px solid #00d4ff; }

        /* 卡片 */
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { font-size: 16px; color: #666; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px; border-radius: 12px; }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card .label { font-size: 13px; opacity: 0.9; }
        .stat-card .value { font-size: 32px; font-weight: bold; margin-top: 5px; }

        /* 列表 */
        .item-list { display: flex; flex-direction: column; gap: 10px; }
        .item { padding: 12px 15px; background: #fafafa; border-radius: 8px; border-left: 3px solid #667eea; }
        .item .title { font-weight: 600; margin-bottom: 5px; }
        .item .meta { font-size: 12px; color: #888; }
        .item .desc { font-size: 13px; color: #666; margin-top: 5px; }

        /* 标签 */
        .tag { display: inline-block; padding: 2px 8px; background: #e8e8ff; color: #555; border-radius: 4px; font-size: 11px; margin-right: 5px; }

        /* 图表区 */
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .bar-label { width: 80px; font-size: 13px; color: #666; text-align: right; }
        .bar-track { flex: 1; height: 20px; background: #eee; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 10px; transition: width 0.3s; }
        .bar-value { width: 50px; font-size: 13px; color: #666; }

        /* 空状态 */
        .empty { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
    <nav>
        <div class="inner">
            <div class="logo">Data<span>Vault</span></div>
            <ul>
                <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">总览</a></li>
                <li><a href="/links" class="{% if request.path == '/links' %}active{% endif %}">🔗 链接</a></li>
                <li><a href="/expenses" class="{% if request.path == '/expenses' %}active{% endif %}">💰 消费</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
    async function api(url) {
        const res = await fetch(url);
        return res.json();
    }
    </script>
</body>
</html>
