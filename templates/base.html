<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DataVault{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8f7fa;
            --surface: #ffffff;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --accent-light: #34d399;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --text: #1e1e2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 14px;
            --radius-sm: 8px;
        }

        [data-theme="dark"] {
            --bg: #11111a;
            --surface: #1c1c27;
            --primary: #7c7ffa;
            --primary-light: #a5a7fb;
            --primary-dark: #5b5ce0;
            --accent: #10b981;
            --accent-light: #34d399;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --text: #e4e4f0;
            --text-secondary: #9090a8;
            --text-muted: #5a5a72;
            --border: #2c2c3e;
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAV ===== */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        nav .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            padding: 18px 0;
        }
        nav .logo span { color: var(--primary); }
        nav ul {
            display: flex;
            list-style: none;
            gap: 4px;
        }
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        nav a:hover { color: var(--text); background: var(--bg); }
        nav a.active {
            color: var(--primary);
            background: rgba(99,102,241,0.08);
        }
        nav .nav-right {
            margin-left: auto;
        }
        nav .settings-btn {
            color: #aaa;
            text-decoration: none;
            padding: 15px 12px;
            display: block;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.15s;
        }
        nav .settings-btn:hover { color: #fff; }
        #theme-toggle { cursor: pointer; transition: color 0.15s; }
        #theme-toggle:hover { color: #fbbf24; }

        /* ===== LAYOUT ===== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ===== STAT CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 0;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card .card-bg {
            position: absolute;
            right: -10px;
            top: -10px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            opacity: 0.08;
        }
        .stat-card.purple .card-bg { background: var(--primary); }
        .stat-card.green .card-bg { background: var(--accent); }
        .stat-card.orange .card-bg { background: var(--warning); }
        .stat-card.red .card-bg { background: var(--danger); }
        .stat-card .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
            word-break: break-all;
            min-width: 0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-card .sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            white-space: nowrap;
        }
        .stat-card .sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== CHART BARS ===== */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            min-width: 0;
        }
        .bar-label {
            width: 72px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: right;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .bar-track {
            flex: 1;
            min-width: 60px;
            height: 10px;
            background: var(--bg);
            border-radius: 99px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 100%;
        }
        .bar-fill.purple { background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
        .bar-fill.green { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
        .bar-fill.orange { background: linear-gradient(90deg, #fb923c, #fbbf24); }
        .bar-fill.red { background: linear-gradient(90deg, var(--danger), #fb7185); }
        .bar-value {
            width: 48px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        /* ===== ITEM LIST ===== */
        .item-list { display: flex; flex-direction: column; }
        .item {
            padding: 16px 18px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: border-color 0.15s, background 0.15s;
        }
        .item + .item { margin-top: 8px; }
        .item:hover { border-color: var(--border); background: var(--surface); }
        .item .title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }
        .item .title a {
            color: var(--text);
            text-decoration: none;
            word-break: break-all;
        }
        .item .title a:hover { color: var(--primary); }
        .item .meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .item .desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.5;
        }

        /* ===== TAGS ===== */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .cat-tag { cursor: pointer; transition: background 0.15s, color 0.15s; }
        .cat-tag.active {
            background: rgba(99,102,241,0.2);
            color: var(--primary-dark);
        }

        /* ===== FORM ELEMENTS ===== */
        input[type="text"],
        input[type="month"],
        input[type="number"],
        select {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        button {
            padding: 9px 18px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: scale(0.98); }

        /* ===== EMPTY STATE ===== */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }
        .filter-bar input { flex: 1; min-width: 180px; }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .page-header > div {
            font-size: 12px;
            white-space: nowrap;
        }
        .page-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* ===== EXPENSE ITEM ===== */
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: border-color 0.15s;
        }
        .expense-item:hover { border-color: var(--border); }
        .expense-item .left .desc { font-weight: 600; font-size: 14px; }
        .expense-item .left .meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .expense-item .amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--danger);
            font-variant-numeric: tabular-nums;
        }

        /* ===== MONEY BADGE ===== */
        .money {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }
        .money.income { color: var(--accent); }
        .money.expense { color: var(--danger); }

        /* ===== SECTION TITLE ===== */
        h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; }
        h3 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            nav .inner { gap: 0; padding: 0 12px; }
            nav .logo { font-size: 16px; padding: 12px 0; }
            nav a { padding: 12px 8px; font-size: 13px; }
            .container { padding: 16px 12px; }
            h1 { font-size: 18px; }
            .page-header h1 { font-size: 16px; white-space: normal; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 14px 16px; }
            .stat-card .value { font-size: 16px; }
            .stat-card .label { font-size: 10px; }
            .chart-grid { grid-template-columns: 1fr; }
            .filter-bar { gap: 8px; }
            .filter-bar input { min-width: 0; }
        }

        /* ===== NOISE TEXTURE ===== */
        .noisy { position: relative; }
        .noisy::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            border-radius: inherit;
        }
    </style>
</head>
<body>
    <nav>
        <div class="inner">
            <div class="logo">Data<span>Vault</span></div>
            <ul id="nav-tabs">
                <li><a href="/" class="{% if request.path == '/' %}active{% endif %}" data-tab="home">🏠 总览</a></li>
                <li><a href="/links" class="{% if request.path == '/links' %}active{% endif %}" data-tab="links">📂 收藏</a></li>
                <li><a href="/expenses" class="{% if request.path == '/expenses' %}active{% endif %}" data-tab="expenses">💰 消费</a></li>
                <li><a href="/ports" class="{% if request.path == '/ports' %}active{% endif %}" data-tab="ports">🔌 端口</a></li>
            </ul>
            <a href="/settings" class="settings-btn {% if request.path == '/settings' %}active{% endif %}">⚙️</a>
            <span class="settings-btn" id="theme-toggle" style="padding:15px 8px;user-select:none" title="切换主题">🌙</span>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
    async function api(url) {
        const res = await fetch(url);
        return res.json();
    }

    // Tab visibility control
    (function() {
        try {
            const hidden = JSON.parse(localStorage.getItem("datavault:hidden_tabs") || "[]");
            const nav = document.getElementById("nav-tabs");
            if (nav) {
                hidden.forEach(tab => {
                    const el = nav.querySelector(`[data-tab="${tab}"]`);
                    if (el) el.closest("li").style.display = "none";
                });
            }
        } catch(e) {}

        // Theme restoration (must be before paint)
        const theme = localStorage.getItem("datavault:theme") || "light";
        if (theme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            document.getElementById("theme-toggle").textContent = "☀️";
        }
    })();

    // Theme toggle
    document.getElementById("theme-toggle").addEventListener("click", function() {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        if (isDark) {
            document.documentElement.removeAttribute("data-theme");
            localStorage.setItem("datavault:theme", "light");
            this.textContent = "🌙";
        } else {
            document.documentElement.setAttribute("data-theme", "dark");
            localStorage.setItem("datavault:theme", "dark");
            this.textContent = "☀️";
        }
    });
    </script>
    {% block script %}{% endblock %}
</body>
</html>
