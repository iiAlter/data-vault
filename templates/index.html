{% extends "base.html" %}
{% block title %}DataVault - 总览{% endblock %}
{% block content %}

<!-- 统计卡片 -->
<div class="stats-grid">
    <div class="stat-card purple noisy">
        <div class="card-bg"></div>
        <div class="label">📂 收藏总数</div>
        <div class="value" id="stat-links-total">-</div>
        <div class="sub" id="stat-links-categories">- 个分类</div>
    </div>
    <div class="stat-card green noisy">
        <div class="card-bg"></div>
        <div class="label">💰 本月消费</div>
        <div class="value money income" id="stat-expenses-month">¥-</div>
        <div class="sub" id="stat-expenses-categories">- 个分类</div>
    </div>
    <div class="stat-card orange noisy">
        <div class="card-bg"></div>
        <div class="label">🌐 来源平台</div>
        <div class="value" id="stat-sources-total">-</div>
        <div class="sub">不同平台</div>
    </div>
    <div class="stat-card red noisy">
        <div class="card-bg"></div>
        <div class="label">📅 最近收录</div>
        <div class="value" id="stat-last-link" style="font-size:16px;word-break:break-all">-</div>
        <div class="sub">最新链接</div>
    </div>
</div>

<!-- 分析图表 -->
<div class="chart-grid">
    <div class="card">
        <div class="card-header">
            <h2>🌐 来源分布</h2>
        </div>
        <div id="links-by-source"></div>
    </div>
    <div class="card">
        <div class="card-header">
            <h2>🏷️ 分类</h2>
        </div>
        <div id="links-by-category"></div>
    </div>
    <div class="card">
        <div class="card-header">
            <h2>💸 消费分类</h2>
        </div>
        <div id="expenses-by-category"></div>
    </div>
    <div class="card">
        <div class="card-header">
            <h2>📈 月度消费趋势</h2>
        </div>
        <div id="expenses-trend"></div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
const COLORS = ['purple', 'green', 'orange', 'red'];

async function loadStats() {
    const stats = await api("/api/stats");
    const links = stats.links;
    const expenses = stats.expenses;

    // 统计卡片
    document.getElementById("stat-links-total").textContent = links.total;
    document.getElementById("stat-links-categories").textContent = links.by_category.length + " 个分类";
    document.getElementById("stat-expenses-month").textContent = "¥" + (expenses.total || 0).toLocaleString();
    document.getElementById("stat-expenses-categories").textContent = (expenses.by_category?.length || 0) + " 个分类";
    document.getElementById("stat-sources-total").textContent = links.by_source?.length || 0;

    // 最近收录
    if (links.total > 0) {
        const lastLink = links.by_source[0]; // just show placeholder
        document.getElementById("stat-last-link").textContent = "有内容";
    }

    // 来源 + 分类
    renderBars("links-by-source", links.by_source || [], "source", "count", links.total || 1);
    renderBars("links-by-category", links.by_category || [], "category", "count", links.total || 1);
    renderBars("expenses-by-category", expenses.by_category || [], "category", "total", expenses.total || 1);

    // 趋势
    const trendData = (expenses.by_month || []).slice(0, 6).reverse();
    const trendMax = trendData[0]?.total || 1;
    renderBars("expenses-trend", trendData, "month", "total", trendMax, "money");
}

function renderBars(containerId, data, labelKey, valueKey, maxValue, displayMode) {
    const container = document.getElementById(containerId);
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无数据</div>';
        return;
    }
    container.innerHTML = data.map((item, i) => {
        const value = item[valueKey];
        const pct = Math.max(4, Math.round((value / maxValue) * 100));
        const label = item[labelKey] || "未知";
        const color = COLORS[i % COLORS.length];
        let displayValue = value;
        if (displayMode === "money" || valueKey === "total") {
            displayValue = "¥" + Math.round(value).toLocaleString();
        }
        return `<div class="bar-item">
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
            <div class="bar-value">${displayValue}</div>
        </div>`;
    }).join("");
}

loadStats();
</script>
{% endblock %}
