<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataVault - 登录</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8f7fa;
            --surface: #ffffff;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --text: #1e1e2e;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --danger: #f43f5e;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 14px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 44px 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { color: var(--primary); }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 36px;
        }

        .token-icon {
            width: 56px;
            height: 56px;
            background: rgba(99,102,241,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 26px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: left;
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            margin-bottom: 16px;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        input::placeholder {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 4px;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            background: rgba(244,63,94,0.08);
            border: 1px solid rgba(244,63,94,0.2);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 16px;
            text-align: left;
            display: none;
        }
        .error-msg.show { display: block; }

        .hint {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
            text-align: left;
            background: var(--bg);
            padding: 14px;
            border-radius: var(--radius);
        }
        .hint code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: rgba(99,102,241,0.08);
            padding: 1px 5px;
            border-radius: 4px;
            color: var(--primary-dark);
        }

        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><img src="/static/logo.svg" alt="DataVault" width="36" height="36" style="border-radius:50%">Data<span>Vault</span></div>
        <p class="subtitle">请输入访问令牌</p>

        <div class="token-icon">🔐</div>

        <div id="error-msg" class="error-msg"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <label for="token-input">访问令牌</label>
            <input
                type="password"
                id="token-input"
                placeholder="请粘贴你的 DataVault Token"
                autocomplete="current-password"
                autofocus
                required
            />
            <button type="submit" id="login-btn">进入</button>
        </form>

        <div class="hint">
            <strong>首次使用？</strong> Token 在首次启动时自动生成，<br>
            位于 <code>~/.data-vault-token</code><br><br>
            或通过环境变量 <code>DATA_VAULT_TOKEN</code> 设置。
        </div>
    </div>

    <script>
    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById("login-btn");
        const errorEl = document.getElementById("error-msg");
        const input = document.getElementById("token-input");

        btn.disabled = true;
        btn.textContent = "验证中...";
        errorEl.classList.remove("show");

        const token = input.value.trim();

        try {
            const res = await fetch("/api/token-verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token })
            });

            if (res.ok) {
                // 存储到 sessionStorage
                sessionStorage.setItem("dv_token", token);
                window.location.href = "/";
            } else {
                const data = await res.json();
                errorEl.textContent = data.error || "Token 无效，请检查后重试";
                errorEl.classList.add("show");
                btn.disabled = false;
                btn.textContent = "进入";
                input.value = "";
                input.focus();
            }
        } catch(err) {
            errorEl.textContent = "网络错误，请检查连接后重试";
            errorEl.classList.add("show");
            btn.disabled = false;
            btn.textContent = "进入";
        }
    }
    </script>
</body>
</html>
